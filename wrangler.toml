name = "splitwise-automation"
main = "src/index.ts"
compatibility_date = "2025-01-05"
node_compat = true

# Cron Trigger - 4時間ごとに実行
[triggers]
crons = ["0 */4 * * *"]

# 環境変数（デプロイ時にSecretsとして設定する必要があります）
