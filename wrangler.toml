name = "splitwise-automation"
main = "src/index.ts"
compatibility_date = "2025-01-05"
compatibility_flags = ["nodejs_compat"]

# Cron Trigger - 4時間ごとに実行
[triggers]
crons = ["0 */4 * * *"]

# Observability設定 - ログとトレースの監視
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[secrets]
required = [
  "SPLITWISE_API_KEY",
  "SLACK_WEBHOOK_URL",
  "SPLITWISE_GROUP_ID",
  "USER1_ID",
  "USER2_ID",
  "USER1_RATE",
  "USER2_RATE"
]